{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Publication card styles -->
<style>
.pub-item {
  display: flex;
  gap: 1em;
  margin-bottom: 1.5em;
  padding-bottom: 1.5em;
  border-bottom: 1px solid #eee;
  align-items: stretch;
}
.pub-thumb {
  flex: 0 0 220px;
}
.pub-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: 1px solid #ddd;
  border-radius: 4px;
}
.pub-info {
  flex: 1;
}
.pub-title {
  font-weight: bold;
  font-size: 1.05em;
  margin-bottom: 0.3em;
}
.pub-authors {
  font-size: 0.95em;
  margin-bottom: 0.5em;
}
.pub-buttons {
  margin-top: 0.4em;
}
.pub-btn {
  display: inline-block;
  padding: 2px 10px;
  margin-right: 6px;
  font-size: 0.85em;
  background: #f0f0f0;
  color: #333 !important;
  border: 1px solid #ccc;
  border-radius: 4px;
  text-decoration: none !important;
}
.pub-btn:hover {
  background: #007acc;
  color: #fff !important;
  border-color: #007acc;
}
@media (max-width: 600px) {
  .pub-item { flex-direction: column; }
  .pub-thumb { flex: none; width: 60%; }
}
</style>

<!-- end custom head snippets -->
